name: CI Pipeline

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  REGION: asia-southeast2
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  AR_REPO: asia-southeast2-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/my-app-repo/nodejs-api

jobs:

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  unit-test:
    needs: static-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  build-and-push:
    needs: unit-test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push
        id: build
        run: |
          TAG=${GITHUB_SHA::7}
          IMAGE=${{ env.AR_REPO }}:$TAG
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  integration-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Run integration tests
        run: |
          docker run --rm \
            -v $(pwd)/tests:/app/tests \
            -v $(pwd)/package.json:/app/package.json \
            -v $(pwd)/package-lock.json:/app/package-lock.json \
            --entrypoint sh \
            ${{ needs.build-and-push.outputs.image }} \
            -c "npm ci && npm run test:integration"

  e2e-test:
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Run E2E tests
        env:
          E2E_IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: docker compose -f docker-compose.e2e.yaml up --abort-on-container-exit --exit-code-from e2e

  deploy-development:
    needs: [build-and-push, e2e-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/skill-test-cloud-run-gitops
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update development service.yaml
        run: |
          IMAGE=${{ needs.build-and-push.outputs.image }}
          sed -i "s|image:.*|image: $IMAGE|" development/service.yaml
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add development/service.yaml
          git commit -m "update development to ${GITHUB_SHA::7}"
          git push
